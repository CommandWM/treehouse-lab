dataset:
  source:
    kind: csv
    name: UCI Bank Marketing
    path: custom_datasets/bank-full.csv
    target_column: y
  split:
    validation_size: 0.2
    test_size: 0.2
    stratify: true

benchmark:
  pack: optional
  profile: external_probe
  objective: Use a recognizable public business-style dataset to check whether the bounded XGBoost-first loop generalizes beyond bundled examples without turning Kaggle or AutoML leaderboards into the center of the project.

evaluation_policy:
  minimum_primary_metric: 0.92
  max_train_validation_gap: 0.05
  max_validation_test_gap: 0.04
  max_runtime_seconds: 90
  max_feature_count: 64
  require_promotion_for_readiness: true

experiment:
  name: bank-marketing-uci-baseline
  description: Public bank marketing benchmark using the UCI direct marketing dataset with a real imbalanced binary target.
  primary_metric: roc_auc
  promote_if_delta_at_least: 0.003
  max_runtime_minutes: 15
  seed: 42
  baseline_hypothesis: A disciplined XGBoost baseline should establish a credible incumbent on a real business-style public dataset before broader benchmark comparisons are added.

model:
  params:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    min_child_weight: 1
    subsample: 0.9
    colsample_bytree: 0.8
