dataset:
  source:
    kind: csv
    name: Kaggle Titanic
    path: data/kaggle/titanic/train.csv
    target_column: Survived
  split:
    validation_size: 0.2
    test_size: 0.2
    stratify: true

benchmark:
  pack: optional
  profile: external_probe
  objective: Use a recognizable public benchmark as an external directional check without making Kaggle the center of the project.

evaluation_policy:
  minimum_primary_metric: 0.82
  max_train_validation_gap: 0.05
  max_validation_test_gap: 0.04
  max_runtime_seconds: 30
  max_feature_count: 32
  require_promotion_for_readiness: true

experiment:
  name: titanic-kaggle-baseline
  description: Kaggle Titanic benchmark run using local offline evaluation on the competition training split.
  primary_metric: roc_auc
  promote_if_delta_at_least: 0.002
  max_runtime_minutes: 10
  seed: 42
  baseline_hypothesis: A disciplined XGBoost baseline with train-only preprocessing should establish a credible first public benchmark on Titanic before any submission workflow is added.

model:
  params:
    n_estimators: 280
    max_depth: 4
    learning_rate: 0.05
    min_child_weight: 1
    subsample: 0.9
    colsample_bytree: 0.8
