dataset:
  source:
    kind: csv
    name: UCI Covertype
    path: custom_datasets/covertype.csv
    target_column: cover_type
  split:
    validation_size: 0.2
    test_size: 0.2
    stratify: true

benchmark:
  pack: optional
  profile: external_probe
  objective: Use a large public multiclass land-cover benchmark to prove that the bounded XGBoost-first loop can stay explicit under more scale and a non-business domain.

evaluation_policy:
  minimum_primary_metric: 0.88
  max_train_validation_gap: 0.06
  max_validation_test_gap: 0.05
  max_runtime_seconds: 300
  max_feature_count: 64
  require_promotion_for_readiness: true

experiment:
  name: covertype-uci-baseline
  description: Public multiclass forest-cover benchmark using the UCI Covertype dataset with the full 7-class target.
  primary_metric: accuracy
  promote_if_delta_at_least: 0.003
  max_runtime_minutes: 30
  seed: 42
  baseline_hypothesis: A disciplined multiclass XGBoost baseline should stay competitive on a larger public benchmark while preserving a clear artifact trail.

model:
  params:
    n_estimators: 220
    max_depth: 8
    learning_rate: 0.08
    min_child_weight: 2
    subsample: 0.9
    colsample_bytree: 0.8

task:
  kind: multiclass_classification
